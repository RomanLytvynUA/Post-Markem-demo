<div id="event-card-{{ comp.id }}"
    class="collapse collapse-arrow bg-white border border-brand-dust shadow-sm rounded-xl event-card"
    data-search="{{ comp.name | lower }}" data-name="{{ comp.name }}" data-date="{{ comp.date }}">

    <input type="checkbox" hx-get="/events/get/{{ comp.id }}" hx-target="#comp-details-{{ comp.id }}"
        hx-trigger="change once" />

    <div class="collapse-title p-0 flex items-center hover:bg-brand-alabaster/30 transition-colors pr-12">
        <div class="flex-1 flex flex-col md:flex-row md:items-center gap-2 md:gap-6 p-5">
            <div
                class="font-mono text-[10px] font-bold text-brand-blue bg-brand-blue/10 px-3 py-1.5 rounded uppercase tracking-widest w-fit shrink-0">
                {{ comp.date }}
            </div>
            <div class="flex-1">
                <h2 class="font-serif text-xl font-bold text-brand-dark">{{ comp.name }}</h2>
            </div>
        </div>
    </div>

    <div class="collapse-content px-5">
        <div id="comp-details-{{ comp.id }}" class="pt-4 border-t border-brand-dust/50">
            <span class="loading loading-spinner text-brand-blue loading-sm"></span>
        </div>
    </div>
</div>
