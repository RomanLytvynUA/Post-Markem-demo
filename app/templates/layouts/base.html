<!DOCTYPE html>
<html lang="en" data-theme="light" class="bg-brand-alabaster">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Markem</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;700&family=Space+Grotesk:wght@300;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script src="{{ url_for('static', filename='js/tailwind.config.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="min-h-screen flex flex-col text-brand-dark overscroll-none">

    {% include "/layouts/navbar.html" %}

    <main id="main-container" class="container mx-auto mt-8 px-4 z-10 flex-grow max-w-4xl">
        <div class="bg-white rounded-lg shadow-xl overflow-hidden border border-brand-dust">
            <div class="bg-brand-blue h-3 w-full"></div>
            <div class="p-8">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>

    <div id="methodology">
        {% include "/layouts/methodology.html" %}
    </div>

    <footer class="bg-brand-blue text-white py-12 border-t border-white/10 mt-auto">
        <div class="container mx-auto flex flex-col items-center text-center px-4">
            <p class="font-serif font-bold text-2xl mb-2 tracking-wider">Post-Markem</p>
            <p class="text-sm text-brand-dust mb-4 max-w-md font-light">
                An open-source tool for analyzing dance sport adjudication transparency.
            </p>
            <div class="w-12 h-px bg-white/20 mb-6"></div>
            <p class="text-xs uppercase tracking-widest text-brand-dust mb-3">Get in Touch</p>
            <div class="flex justify-center gap-6 text-sm">
                <a href="mailto:romanlytvynua@gmail.com" class="hover:text-white transition-colors">Email</a>
                <a href="https://github.com/RomanLytvynUA" target="_blank"
                    class="hover:text-white transition-colors">GitHub</a>
                <a href="https://linkedin.com/in/hight_time_i_got_one" target="_blank"
                    class="hover:text-white transition-colors">LinkedIn</a>
            </div>
        </div>
    </footer>

</body>

</html>
