{% extends "/layouts/base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
        <h1 class="text-3xl font-bold">Directory</h1>
        <div class="flex gap-4 w-full md:w-auto">
            <input type="text" id="search" placeholder="Search names..." class="input input-bordered w-full"
                oninput="handleSearch()">

            <select id="sort" class="select select-bordered" onchange="applyFiltersAndSort()">
                <option value="name_asc">Name (A-Z)</option>
                <option value="name_desc">Name (Z-A)</option>
                <option value="adj_desc">Most Adjudications</option>
                <option value="comp_desc">Most Competitions</option>
            </select>
        </div>
    </div>

    <div class="tabs tabs-boxed mb-6 justify-center p-1">
        <a class="tab tab-active" onclick="setFilter('all', this)">All</a>
        <a class="tab" onclick="setFilter('adj', this)">Adjudicators</a>
        <a class="tab" onclick="setFilter('comp', this)">Competitors</a>
    </div>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-2 items-start"></div>

    <div id="scroll-sentinel" class="h-10 w-full mt-4"></div>

</div>

<template id="person-card-template">
    <div class="group flex items-start justify-between p-3 rounded-lg border border-base-200 bg-base-100">

        <div class="flex flex-col min-w-0 flex-1">
            <h2 class="text-sm font-semibold truncate pr-2 group-hover:whitespace-normal transition-all" data-name></h2>

            <div class="flex gap-2 mt-1">
                <span class="text-[10px] uppercase opacity-60 font-bold whitespace-nowrap">Adj: <span
                        data-adj></span></span>
                <span class="text-[10px] uppercase opacity-60 font-bold whitespace-nowrap">Comp: <span
                        data-comp></span></span>
            </div>
        </div>

        <a href="#" class="btn btn-ghost btn-xs btn-square shrink-0" data-link>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14m-7-7 7 7-7 7" />
            </svg>
        </a>
    </div>
</template>

<script>
    // 1. Initial Data Setup
    const people = {{ data | tojson }}.map(p => ({
        id: p.id,
        name: p.name,
        adj: p.adjudicators,
        comp: p.entries
    }));

    let filterType = 'all';
    let filteredData = [];
    let currentlyRendered = 0;
    const BATCH_SIZE = 100; // Load 100 cards at a time

    const grid = document.getElementById('grid');
    const template = document.getElementById('person-card-template');
    const sentinel = document.getElementById('scroll-sentinel');

    // 2. Debouncing for Search (prevents lag while typing)
    let searchTimeout;
    function handleSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            applyFiltersAndSort();
        }, 300);
    }

    // 3. Math Engine: Filtering and Sorting
    function applyFiltersAndSort() {
        const q = document.getElementById('search').value.toLowerCase();
        const sortMode = document.getElementById('sort').value;

        // Apply Text and Tab Filters
        filteredData = people.filter(p => p.name.toLowerCase().includes(q));
        if (filterType === 'adj') filteredData = filteredData.filter(p => p.adj > 0);
        if (filterType === 'comp') filteredData = filteredData.filter(p => p.comp > 0);

        // Apply Sorting
        filteredData.sort((a, b) => {
            if (sortMode === 'name_asc') return a.name.localeCompare(b.name);
            if (sortMode === 'name_desc') return b.name.localeCompare(a.name);
            if (sortMode === 'adj_desc') return b.adj - a.adj;
            return b.comp - a.comp;
        });

        // Reset the grid and draw the first batch
        grid.innerHTML = '';
        currentlyRendered = 0;
        renderBatch();
    }

    // 4. Render Engine: Document Fragment for maximum speed
    function renderBatch() {
        const batch = filteredData.slice(currentlyRendered, currentlyRendered + BATCH_SIZE);
        if (batch.length === 0) return; // Reached the end of the list

        const fragment = document.createDocumentFragment();

        batch.forEach(p => {
            const clone = template.content.cloneNode(true);
            clone.querySelector('[data-name]').textContent = p.name;
            clone.querySelector('[data-adj]').textContent = p.adj;
            clone.querySelector('[data-comp]').textContent = p.comp;
            clone.querySelector('[data-link]').href = `/people/${p.id}`;
            fragment.appendChild(clone);
        });

        grid.appendChild(fragment);
        currentlyRendered += batch.length;
    }

    // 5. Tab UI Updater
    function setFilter(type, el) {
        filterType = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
        el.classList.add('tab-active');
        applyFiltersAndSort();
    }

    // 6. Infinite Scroll Observer
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            renderBatch();
        }
    }, { rootMargin: '200px' }); // Load the next batch slightly before they reach the bottom

    observer.observe(sentinel);

    // Initial load trigger
    applyFiltersAndSort();
</script>
{% endblock %}
